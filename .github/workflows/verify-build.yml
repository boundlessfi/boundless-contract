name: Verify Build
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'contracts/**'
      - '.github/workflows/verify-build.yml'
  pull_request_target:
    branches:
      - main
      - develop
    paths:
      - 'contracts/**'
      - '.github/workflows/verify-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Setup Rust and Stellar
        uses: ./.github/actions/setup-rust-stellar

      - name: Build events contract
        run: cd contracts/events && make build

      - name: Build profile contract
        run: cd contracts/profile && make build

      - name: Check WASM sizes (64 KB ceiling)
        run: |
          for f in target/wasm32v1-none/release/*.wasm; do
            size=$(stat -c%s "$f")
            name=$(basename "$f")
            echo "$name: $size bytes"
            if [ "$size" -gt 65536 ]; then
              echo "::error::$name exceeds 64 KB ceiling ($size bytes)"
              exit 1
            fi
          done

      - name: Run tests
        run: cargo test --release

  rustfmt:
    needs: build
    if: success()
    uses: ./.github/workflows/rustfmt.yml
    secrets:
      STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
      SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
      CONTRACT_ID: ${{ secrets.CONTRACT_ID }}
